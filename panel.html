<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Promptify — Panel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="popup panel">
  <div class="row">
    <select id="profile" title="Refinement profile"></select>
    <label class="check site" id="site-pin-wrap" hidden>
      <input type="checkbox" id="site-pin"> <span id="site-pin-label">use on this site</span>
    </label>
  </div>

  <textarea id="input" rows="4" placeholder="Paste your rough prompt…"></textarea>

  <details class="opts">
    <summary>Refinement options</summary>
    <div class="grid">
      <label class="block">Role <select id="role"></select></label>
      <label class="block">Format <select id="format"></select></label>
      <label class="block">Length <select id="length"></select></label>
      <label class="block">Tone <select id="tone"></select></label>
      <label class="block">Audience <select id="audience"></select></label>
    </div>
    <div id="extras" class="extras"></div>
    <div class="grid">
      <label class="block">Provider <select id="provider"></select></label>
      <label class="block">Model
        <input id="model-filter" class="mini" placeholder="Filter models…">
        <select id="model"></select>
      </label>
    </div>
    <label class="check"><input type="checkbox" id="free-only"> free models only</label>
  </details>

  <div class="row action">
    <button id="refine-btn" class="primary">Refine</button>
    <label class="check x3" title="Generate 3 variations"><input type="checkbox" id="variations"> ×3</label>
  </div>
  <div id="paid-note" class="muted" hidden>×3 sends 3 requests to a paid model.</div>
  <div id="error" class="error"></div>

  <div id="cards" class="hidden"></div>

  <div id="result" class="hidden">
    <pre id="output" class="output"></pre>
    <div class="row">
      <button id="copy-btn">Copy</button>
      <button id="save-lib-btn">Save to library</button>
    </div>
    <div class="row" id="save-lib-row" hidden>
      <input id="save-lib-name" placeholder="Snippet name…">
      <button id="save-lib-confirm">Save</button>
    </div>
    <div class="row">
      <input id="tweak" placeholder="Tweak it… e.g. make it shorter">
      <button id="tweak-btn" title="Apply tweak">↻</button>
    </div>
  </div>

  <details class="opts">
    <summary>History</summary>
    <ul id="history" class="list"></ul>
  </details>

  <details class="opts">
    <summary>Library</summary>
    <input id="lib-search" class="mini" placeholder="Search snippets…">
    <ul id="library" class="list"></ul>
  </details>

  <footer>
    <button id="open-panel" class="link" hidden>Open in side panel</button>
    <button id="open-options" class="link">⚙ Settings</button>
  </footer>

  <script src="shared.js"></script>
  <script src="popup.js"></script>
</body>
</html>
